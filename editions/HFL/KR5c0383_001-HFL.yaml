  text: 萃善録卷上澄五
  hash: sha256:6f69bc599c18cc4b6f1b15f8e35ab5ec9cb9adacbebce5559c088c2090f54f1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0383_HFL_001-001a, image: hfl/0617/0617-018.png}
body:
  text: 聖節祝君之詞聖人生焉瑞遶紫樞之電上帝臨汝喜開黄道之雲齋肅陳詞明晨有請伏念新傳祖印逺覲宸廷香頒龍虎之壇親承上㫖壽祝麒麟之殿未遂南轅命玄侣以脩齋對威顔而歸美恭願緑章夜逹來仙仗於清都丹扆春融永丕基之洪福謝雨詞布地爲壇土皆作玉望雲請命天乃雨珠生意頓囘元功不宰伏念自名以道待飽於農凡仰愧俯怍之餘有春作秋祈之望屬以亢旱異於曩時旣自郊而徂宫禱之久矣庶匪朝而依夕苗則勃然盖移粟之民已疲倘荐飢則歲何仰不違咫尺遂俾霶𩃱返神水以安靈薦潢汚而報本伏願賜之終惠保此有年自三日巳徃爲霖更漙餘波之潤無一夫不被其澤同爲樂國之歸天師在京就山還醮君命不竢駕阻瞻咫尺之清光皇天無𥝠親妙運兩間之元化敬緘香於帝里歸奏牘於宗壇伏念慶籍世資叨傳祖印言尤行悔顧教法以多違家難命竒致灾非之荐見幸際龍飛之治遄爲驛傳之朝孰謂微痾竟淹半載思切宸旒之寵對聿嚴靈寳之齋脩謝過消災祈恩請命伏願帝心簡在人欲必從鑒其悔艾之𥝠錫以生成之造眞風赫奕日深丹扆之知新渥駢蕃露重紫泥之賜凡存志命悉宥恩庥酬禳火醮詞庚午年吳皆春夢見崇禧㕔前有一物又遇竹軒䰟歸乃云其房當有火火久軒遂許醮獲安夢而占夢同知幻境之無憑疑以傳疑敢忽前車而不戒昔焉徼福今也酬恩伏念求木苟完寢薪是懼彼蝶化之紛紜莫詰聞者隱憂况鹿隍之失得或然愼之爲貴乃以恍惚杳冥之故而爲和平安靜之求帝示矜容人思報稱伏願𥘉盟克踐終惠𠃔諧曷日而忘永戴風兩帡幪之造惟天所命宻符祖宗香火之心德布春陽恩沾莫景天師慶成藏殿醮詞道機無息乃春殊庭法藏韋新寔依玄造爰慶成於一醮庸籲告於群眞伏念切已興思拊躬省過或以前因而今受或謂寡是以多非或下情宿怨而罔知或隂隲可爲而自失或命身之位與孤曜以相逢或嗣息之宫背吉星而不照乖違至此懴釋何由謂寳藏經營信斡旋之有地况眞斿森列可運轉以囘天幸人巧之成功希聖明之從欲肅陳凡悃恪露中誠伏願霽仰威顔春生容德造化無停輪之理變通於轉轂之間八卦凝神見乾坤之六子三陽發秀回否泰於一時錫命在天俟恩即日呉惟德薦母客途天逺空馳游子之心郷岫雲停不見慈親之面俯遵玄教仰叩淸都伏念淺矣學仙闕焉事母將謂轉蓬苟得尚酬菽水之歡豈期泛梗言還遽洒萊衣之血揆一子出家而奚益幸十方救苦之不誣愍日適臨沖科特啓伏願珠浮獅坐玉揉龍章蓬島囘車喚醒虛无之夢桃池侍宴容登快樂之鄕魂氣有歸後昆允頼建九幽正醮詞物莫預知痛先臣之棄背情惡可巳祈上帝以超升言不成文泣盡繼血伏念父呉霜未老燕璞何仇孰謂無牙而藴至深之毒廼傷其指竟罹罔極之憂豈其遺㣧之不天抑亦患身之有數丹心耿耿不能鳴没世之悲玄範恢恢庶以慰重泉之望澗芹可薦鑒藻無𥝠伏願開解脫門指虚無路宿𡨚氷釋搤喉敢起於妄心逝魄雲昇錬質全資於善果率行正道惠迪後人仙姑薦父母父何怙母何恃嗟永隔於歸寧乾資始坤資生冀重開於化育三熏請命九拜投誠伏念季女有歸二親莫贖謭焉洪祀賛善教以利人愓若奉先愧近功而撫已蒿目濺感時之淚草心萌追逺之思明氷具陳恩波𠃔頼伏願大鈞無息至鑒有容地道陽光超椿萱之朽質人元合妙副葵藿之私情周年建醮薦母母兮鞠我蓼莪之痛無窮朞而小祥白駒之過何速惟攄哀素上徹穹蒼伏念某自罹陟屺之悲忍見星周之次念升沉之莫測幸㧞度之有科謹㓗塵居肅迎飈馭伏願雲開黄道風送緑章詔三界以逍遥擁萬眞之來下慈光逺被庸昭觀盥之誠明日將朝不盡童蒙之瀆孫秋碧就普度酬所許保安就薦先師祖盧自間追想前猷願有盟而必答寓誠普度思如在以宜超敢食前言輒千上聽伏念有身爲患厥疾弗瘳急告于天猶幸苟延於一醮囘生無地忽驚巳過於七年逝者逺而許者存心所知即神所記謭焉報貺期以出幽伏願大道有情至眞無外指蓬萊路或從織女而歸入黍米中同㑹天人之樂周圎功果啓迪仍昆陳制帥黄籙宿啓詞緑林戢盗熟小麥以休師皂嶺巢仙㓗菁茅而事帝科嚴修於玉匱事宿闡於瑶壇伏念謬以撫綏任兹討捕謂人爲天地之貴何忍殘生若賊遺君父之憂是名負國爰親從於士卒偶活致於渠魁雖幸凱還能無濫殺報風聲鶴唳之助見莠除苗長之仁伏願旋斡雍熈銷沈乖盭兵凶器用非得已壹空白骨之𡨚利公家知無不爲洞鑒丹心之素三朝詞凉生蘂殿夏五月以風薰梵遶芝壇日三朝而晝永嚮天威之咫尺賛君德之輝光伏念某叨竊寵靈周旋軍旅僅解嚴於汀建復蓄銳於洪䖍蟻宂就焚幸兇渠之檻送龍顔動喜因捷報於驛聞兹闡事於閤峯敬歸功於魏闕伏願皇天佑宋舊境還周萬化更新見君臣之慶㑹五兵寢息増朝野之歡娛晚朝詞細柳除營甫定積年之㓂白楊悲隴莫招長夜之魂即福地以脩齋遡昊天而瀝懇言念盗興於贑人死如麻就縳抵刑自速藁街之戮摧鋒䧟陣多㘅草野之𡨚在臣意者以拯民惟帝相之而破賊殺非得已生亦無窮伏願大赦幽牢普超苦爽五方異俗化金革於農桑三代同風混車書於禮樂宫門驅蝗多稼連疇意豐登而可待群蝗入境廼侵齧以爲灾民命所關帝心斯在言念大江之右夙稱樂土之中邊國粗寧幸免軍需之急浙郷不熟已傷官糴之繁正望稔於此秋庶全生於爾衆屬蝗蝻之大孽遍滿郷閭顧蟻蝨之小臣主持宫宇力捕莫施於坎地醮禳惟謹於祈天伏願哀憫衆生赦原萬罪羽蟲揖揖掃除勑田祖之神寳穡垂垂刈穫錫農夫之慶矢詞迫切拜賜須㬰顯應觀設醮祈晴詞望霓有禱旣賜霶𩃱積潦不収遂憂昏墊睠浙人之宅土即澤國之圍田凡雨過多雖苗無秀矧江潮之齧岸加湖水之渰廬因沮洳以復隂將鬰蒸而成疾天子側躬而軫慮計臣思戢以遑安肅闡醮筵恪陳奏牘伏願乾坤軒豁離曜輝光農務三時訖暑耘而秋熟王畿千里保物阜以民康明堂預告設醮祈晴詞君國子民紹一元之大統父天毋地嚴三世之親祠爰合祭以戒侯用前期而申禱伏願璇穹秋豁玉燭時調上帝降祥禮迄成於重屋冲人嗣服祚益茂於丕基顯應觀祈雨詞民亦勞止春失種以無秋天何言哉日常暘而不雨深惟闕政祗控危𠂻伏念護漕罔功來歸未遂星流白晝屢傳旱野之占氣入朱明愈急水田之務旣群祠而遍禱惟上帝之求哀伏願勑下雲雷澤盈溝澮貽麰播穀錫嵗事之豐登合璧連珠示乾文之嘉瑞如乖吏狀請罰臣躬顯應觀再設醮祈雨詞農時旣失旱太甚以如焚天聽孔卑信未孚而弗福故忘煩喋仰叩穹明伏念兩儀漕畿孤忠體國經費倍支而罕撥叨榮宜去而復留浙西東粒米之郷所祈豐稔夏仲孟梅霖之景廼向焦枯暴巫徒市莫効於人爲呼雷召龍率由於帝命旣瀕湖而醮欵祈沛澤以昭蘇伏願敕歛驕陽恩敷甘雨水耕火耨亟施田畯之功粟腐錢流汔濟邦儲之用尚諧中熟庶弭多虞代茅山祈雨詞年穀垂成政需澤潤秋陽爲沴反病亢乾即仙聖之所居爲𥠖元之有禱伏念濫膺顓閫兼領陪京維時多虞所望一稔序旣當於揫歛田尚苦於燥剛始自近郊逺連並塞地綿千里皆懷卒歳之憂帝監四方忍絶斯人之命使旱勢遍臻於屬部恐咎端專在於微臣實震懼之靡寧冀精誠而上逹伏願普敷德澤徧惠群生哀此矜人久服勞於穡事沛然下雨俾無廢於歳功開元宫禳火詞流星隕晝仰天戒之髙明比屋延燒傷民生之蕩祈肅持惻怛上告穹蒼伏念無𥙷使家僅尋時瘼泉務流而廼壅巳病閭閻火弗戢而屢焚仍空盖藏維商丘之有祀祚宋國之無疆爰脩瓘瓉之儀祗欵琳琅之駕伏願誕施仁愛潜弭灾虞地大京師息融風而奠枕春深田野賜膏雨以催耕禳兵詞峒宂無知輒起緑林之盗封疆所界深懷赤子之憂仰遡顥穹肅陳危悃伏念典州踰歳闔境逢年鄰㓂鴟張毒忽流於塗炭兇徒䑕伏釁將動於蕭墻荷天敗其逆徒尚日馳於警報王宫䧟逐寨卒創殘居多控扼之兵未快蕩平之舉敬爲民之請命輒籲帝以投誠伏願赦過一方全生萬衆厄㑹宻移於天運先聲克壯於軍容殱厥渠魁稍謝無辜之鬼安其田里咸歸不殺之仁祈皇嗣南靣視朝久嗣大君之位東儲繼體宜膺男子之祥屢醮禱於蒼穹佇感通於禁掖即太乙貴神之舘合下元本命之辰申𩛙羽流恪陳朱奏伏願帝心顧佦國脉昌隆帶韣授弓駢集椒途之喜承祧主器𠃔符𤓰瓞之綿章尚書九幽醮詞劬勞念母德至大以難酬哀痛徹天道無方而善應輒脩清醮恭瀝丹忱伏念亡母懿行在躬先臣同齒子七人而保抱忠孝良勤孫三世以團欒慈憐僃至湯沐旣開於隣國㫖甘粗適於偏闈上壽以傾諸孤之釁顧微軀而若失更再愬以増悲敬遵玉匱之科荐剡緑章之奏伏願恩言曰可過誤其空風起白楊不待幽阡之閉火傳金籙亟超樂土之生下及漏泉旁沾餘潤方司法五七詞女子有行所期偕老吾夫又死㡬不勝哀舉塵案以自怜寫録章而上奏伏念亡夫甫沾寸禄沓失層親枕塊纒悲方經營於逺日臨塋成疾竟殞滅於芳年痛兹家室之情慘甚戸門之禍孤嫠無倚痛泣何聞伏願降鑒哀恫赦除愆妄度此魂於生地仍識天倫撫弱子者寡妻常依道廕陳帥玉隆宫黄籙宿啓詞視事惟新未靖緑林之㓂感時多故輒脩黄籙之齋躬造福庭宿開靈墠臣丹心君上白髮兵間閩部解嚴𦍒君民之肅睦江墟徙鎮傷饑饉之荐臻豈生靈積過之滿盈抑官吏貪殘之由致祗醮神仙之宅覬囘天地之仁伏願玉燭調和珠𨇠循軌上固一人之壽下全萬物之生峒孽就平師不煩於乆外田禾告稔臣庶獲以偷安天曆爲宗師還保安醮詞北望鴈書想玄門之宗主東瞻馬首祈洪造之真靈應不逾時報當知本伏念進脩在已行止非人司教日邊每盡扶持之力縻身關外適當間隔之時甞徼福以籲上天乃䝉恩而有今日端不由於幸得何敢食於盟言敬肅元壇恪酬清醮伏願國經求舊帝渥從新教雨載濡納道山於九潤壽星一㸃暎台象於三階天師留京建年經詞日之餘歳之餘幸依光而及此邦必逹家必逹期徼福以皆然且謝且祈如臨如履伏念某朝君身逺祀帝心長時荐易於年華德難忘舊天宻胚於道脉恩企迎新恪陳藻薦之誠黙寓葵傾之悃銘藏匪報鑒照惟明伏願洪造垂仁皇都恊慶生成一致門迎佳氣之春出處兩榮驛寄喜音之早誓脩隂德仰答元功解壇詞人間塵世嚴祭祀之瓊壇帝所清髙下照臨之玉節朝儀已僃齋事告周禮貴節以成文義有同於旣灌伏願皇靈穆穆鑒觀趨退之恭師造昭昭察宥愼終之典謝恩詞一陽來復父初索於震男三願幸孚帝下觀而臨汝此恩此德何報何言伏念某素欵旣周皇靈不昧雪先呈瑞餘半月以俱晴日暖如春後三朝而乃雨皆神明之所感於氣象以可知況凡我同盟相終始於陟降暨百爾執事咸進退以安閑非由臣意簡在帝心何以天時合於人事載熏載沐且謝且祈伏願鑒藻有開澗蘋惟享㡬微發見驗所欲之必從兆朕萌芽信不言而善應代人保疾詞疾病同心義重扶持之日愛慈異骨誠祈覆燾之天惟帝納言以人從欲伏念某力開道宇身積患端風爲末疾之根外因猶淺疾有逆流之水逺慮實深未收功於參术之竒曷滿望於桑榆之晚掃觀庭而蕆醮欵鸞駕以希恩伏願仙墨香留神丹霧散天醫臨地醫㑹有藥長生福星明壽星髙如椿難老瑕疪一洗膏馥同霑庚午年春舒貴和捧御香入山建金籙大齋宿啓詞皇天后土旣全付於丕圖名山大川庸聿嚴於外祀逺馳一使祗格三靈當皷鐘玉帛之初陳乃圭璧琮璜之具備昭其文也寓乾坤宗子之心神而明之爲社稷生民之地早朝詞申明春令爰攄朝日之誠寅畏夙興敢替事天之敬仰觀非逺黙感而通念有民何頼以治安亦惟帝實爲之主宰天高星逺行五緯以無差地利人和鎭八維而不動午朝詞離文明兩如日再中乾道時成惟天爲大肅使華而代祀仰帝闕以趍朝願感至誠聿嚴善應一民莫非其有天與禎祥萬物各遂其生日依化育晚朝詞纂圖御衆不忘夕惕之思分命祈天益謹暮朝之敬緘一誠而自逺貴三極以潜通宻勿之間對揚斯在國經咸若尚聞堯壤之歌皇極無偏丕錫箕疇之福正醮詞社稷艱難叨承基緒山川禋祀曷答穹祇念有土之多虞揆爲君之不易赤子備嘗於危殆凶年不免於流亡無以囘天豈其能國敢寓誠於一醮庶悔禍於三靈啓迪時幾願示小康之効昭蘇邦本即開大有之祥生聚敉寧治安馴致壬申聖節宿啓詞誕彌厥月揆𥘉黙軫於中懷欽若昊天報本聿嚴於外祀乃馳使幣祗醮仙壇脩五禮以如方祈三靈而有鍳盛德在木載揚發育之心明日將朝荐啓敷宣之目早朝詞夙興惟謹致祀帝之𥘉誠旰食靡寧以保民爲先務托玄科而請命見宗子之用心懷在有仁念兹惟帝五風十雨得中道之豐登四海九州足小康之資聚午朝詞日中則昃戒實在於滿盈天聽孔卑念孰爲之保定國有與立時方可爲奉金籙以祈恩啓丹扄而事命惟天孚佑益開享祚之祥率祖攸行訓至寧邦之盛晚朝詞日之餘曰夜敢終怠於朝儀國之本在身忝丕承於明命時臨初度齊啓沖科寧無自求多福之心所願宻注長生之字大恩曷報躬行遵道之言終惠有祈誓體代天之責正醮詞日當再育忝分光嶽之靈天無常親宻運基圖之重撫時以感出命而祈翦焉夜𥧌以夙興比者冬行於春令孰爲民極固不止水旱疾疫之憂自揆國經何以逭脩齊治平之責林然庶證叢於厥躬乃脩外祀之嚴願格三靈之佑有人有土志維綏靖之求而國而家身見隆平之效聖節宿啓詞三日天氣新揆於初度八荒開壽域保運長存香霧空濛真風演迤遹金人捧水心之劔建瑶壇懸黍米之珠宿啓沖科仰關宸慮伏願三境䟽恩萬眞降鑒九五福曰壽九五福曰富廓寰宇以爲家八千歲爲春八千歳爲秋長上古而不老朝詞聰明作后虹流上巳之辰馨香感神鰲抃普天之下來皇華於福地肅金籙以祈天稽首紅雲投誠青祝恭願星輝海潤開壽富於三宫山髙日升育人民於九土又五道惟欽謹緘香於福地帝心簡在祈眷祐於皇家俯瀆緑章上陳玄鑒伏願咫尺若臨卑髙罔間不言善應隂陽順而風雨時至治無爲股肱良而庶民育天曆祝聖代天作子方當繼統之𥘉繞電有期預至祝𨤲之請伏願清時偃武黔首歸仁甲兵洗衣裳垂太平有象日月光山河壯萬壽齊天閤皂山國醮詞天錫九疇撫下期躋於壽域國專七祀升中爰即於名山眷膺金闕以定四郵及在玉衡以齊七政皆隂隲下民之力致䖍昭上帝之心伏願八表又寧三宫益壽天地平而元氣正俾萬物以無疵隂陽和而庶𩔖成資一人之有慶早朝詞浴咸池出暘谷現赤日之九芒排閶闔入帝居覲紅雲之一朶眷宵衣而待旦吹暖律以囘暄逺馳奏事之香待錫治安之䇿伏願福持寳位慶浹璇宫慰安向於龍樓賛休徴於鶴禁陽分隂而二儀立衍億世之皇圖正得秋而萬寳成洽八方之𥠖獻午朝詞日至昆吾而正中克成厥象風駕扶摇而直上敷奏以言矧金鐸之息聲暨玉衡之順軌用殫朕志簡在帝心伏願俯賛皇猷誕敷文德六府三事𠃔治丕弘有求之基四海九州攸同共樂無爲之治表榜正薦太隂表生明合德運天一之至精懸象降靈行地中之漙潤恢恢眞造泯泯神機某臨照隨人盈虚有道廣寒清靜嚴七寳之髙居明水苾芬叶方諸之大用欲成玉錬九生之妙必資金波一滴之餘共望澤潤下滋類從俯應天與形道與貌必符造化之全月爲魄日爲魂不越隂陽之外陶鎔𠃔頼俛仰知歸鍊孤魂第九夜天尊表副玉匱盟真超幽魂於九地寳華應號證道果於諸天仰瀆宸聰俯攄齋悃共望玉京毓秀瓊闕騰芳萬寳裝嚴仰彌羅之梵炁九天照燭開幽暗之昏衢魂度朱陵慶流後裔黄籙榜語迎眞六琯浮春一陽來復九關戒曉萬聖齊臨方黄壇望幸之時正紫氣開先之際將恭清道仰止浮空雲漢昭囘神氣運風霆之表天地明察衮衣流日月之光方域百靈起居先路瑶壇絳節久凝蘂籍之班玉几紅雲一鑒松花之㑹監門榜法門廣大曽何間於戚䟽帝所清髙若不違於咫尺必恭敬止盍歸來乎莫問子爲誰孰云身是客衆妙非妙於此示寂然不動之機至言無言亦豈有甚髙難行之事好共看天人黍米信本無風雨蓬萊潔已從之致身易爾塵世茫茫汲汲何許是到家時玄關直直堂堂這裏有入門處神明懋戒凡聖同歸天醫榜世之最苦者曰窮民偏多疾疢天果何爲而有醫道黙與主張至於遊魂爲變之時亦有仰首鳴號之意想神農想軒后九霄難問於髙居如秦緩如越人千載猶存於生氣玉皇之上藥三品金碧之大丹九還𥙷造化而禆隂陽有神氣而無形跡洪惟天法道每垂情於癢痾疾痛之間莫謂鬼非人重施力於神聖工巧之外賛彼元化相我齋功沐浴榜詩人吟玉女有盆只要洗頭漁父答大夫此水但堪濯足皆非盡善不可効尤蓋隂陽顚倒之坎離其功甚大况一六生成之天地得氣最先飮之者冷暖自知掬之者清涼無盡是名沐浴具體設陳秋入肺肝五内洒金莖之露冷侵毛骨一壺浸寒玉之氷對之而塵垢自消因得以形神俱妙非如春暮果從沂水以詠歸豈比華清咲出温泉而拜賜脫然無我洗者是誰監生榜太極肇判乾坤定而六子生元氣散分隂陽交而萬形具惟人最貴所主有神以其爲天地之心果誰執造化之柄茁籣可愛皆由萬靈恭奉而來坐草云亡或出一念扶持之外未脫秋瓜之蔕莫囘寒谷之芳秩秩有司化化無跡子知向來夢應作如是觀靈芝本亦無根到此好叅衆妙桃花自貪結子教人錯恨東風淨洒洒然長惺惺去監齋榜黍稷非馨吾聞其語粢盛不㓗士聽無譁天地之道昭昭然鬼神之情洞洞爾非誠莫享在德宜酬蓋芬苾具陳雖松華而不棄若馨香可薦縱藴藻以無嫌然勞薪之火其可以炊而埃墨之飯安敢以祭况失飪不食聖人之教訓宜然苟聞腥于天上帝之崇髙則否致其㓗也將何道神而明之惟汝賢尚昭乃勲毋曠厥職道腴非味何求昜牙之知食指欲嘗罔俾子公之染雲厨必戒天爵宜陞茭郭立茭郭以欵幽魂一朞兩見到蓬山而聞妙道千載重逢流年擲梭紅顔春樹人生能㡬何朔風驚沙枯梢號寒子行亦良苦四海兄弟一㑹神仙曩者玄師曽指幽關之正路今兹教主又宏苦海之慈航以何因縁得此方便生我所欲也義我所欲也幸逢兼取之魚熊貴者驕人乎賤者驕人乎勿効相持之鷸蚌雪匙可以適口雲笈爲之洗心道味悠長善端呈露天寛地大曽何夜雨煩𡨚隂極陽囘别有春風消息孤魂榜莊子甞言受成形而形有盡阮瞻所見論無鬼而鬼不然則知二氣之良能難以一途而偏廢伯有彭生之事古人豈欺我哉魏其灌夫之𡨚信史有如彼者生生死死古古今今金谷園林此地豈無歌舞平泉花木㡬人看到子孫逝川只解東流白日又還西落曰鰥寡曰孤獨况下民多無告之窮或札瘥或天昏而上天之剥䘮者半艱難萬狀貧病交攻其間浩歎何勝到底同歸于盡以無祭主故曰孤魂幸今逢黄籙齋官又特啓玄科好事飽汝以食而無餒暖汝以衣而不寒三十六部尊經善縁得未甞有一萬二千金簡魂氣當無不之仙道佛道儘堪行天門人門皆可去黄壇囘首處快乗蓬島清風丹府記名時盡入黍珠碧落皆大懽喜便好超升將吏榜雲篆太虚道因文顯風霆神氣將以心存况兩間光嶽之散分有一揆天人之㑹合魯公竟爲雷吏傳說自是列星李將軍生不封侯其必在爵秩同升之列張睢陽死願殺賊將亦發英䧺未了之心雖道之體本出於自然而法之用寔存乎策役瓊臺㧞地玉輦瞻天金簡合符寳書啓鑰于以廓靈風而昭慧日于以引歸路而濟迷津九幽之黒處皆明一寸之丹心黙契惟道貴度非神不行作善降祥馴致仙家之喜慶論功行賞超遷天上之班資節次榜齋以事帝固宜由本以及文道不逺人其可有綱而無目眷我黄壇列職無非紫府朝班秩秩有儀諄諄以告言而爲法動而爲則當如君父之在前舉之於口筆之於書須信神仙之可學必也周行中規折行中矩勿謂視於無形聽於無聲謫果何尤黄庭之誤者一字過無可奏庚申何畏乎三尸相與盟天有如皎日茶榜問海上靈槎光彩巳騰於星漢擷山中瑞草芳香又接於蘅薇䇿上品之竒勲吸群英之佳氣共惟天師胄承漢葉器備仙根道味精微灼見中𤅷之水善芽茂宻未論蒙頂之苞紫蘭香桂之所依朱草嘉禾之近侍輕雷破莢甦醒群昏明月爲團晶輝獨露一飮者巳量俱足共談而舌本潜通曵翠旗按蓬萊清風兩腋執蒼璧朝閭闔喜徹九重遟遟三丈之日高欵欵五千之文進佳句自聮於石鼎貴名又起於金甌白雪滿椀花徘徊小引鼻端之馥仁風暗結珠蓓蕾早囘掌上之春㸃首而前瀹心以進酒榜黄壇設醴洪鈞轉而一陽生玄舘飛觴大禮成而諸福備竹松如醉猿鶴歡迎共惟天師雲炁尊罍道山鍾鼎聖明時和熏甘露神仙府瑞靄香風舉瓢酌天漿神情邁俗停杯問明月逸興無塵混融乎青州鬲上之分浹洽乎玉瓉黄中之妙沉酣道味醖藉仙風有盎然深念之良心便釀就滿腔之喜炁輿人傳頌何須論千日竒芳天子呼來又欲醉九重春色想宴罷鳯邊丹詔記賜來馬上黄封敲玉壺氷想道臣心之如水指金莖露笑看仙掌之凝珠鬱鬯味濃蘅薇香近水燈榜水燈映水開成仰覆之蓮花天影粘天照見虚無之蓬島九淵不夜千炬浮春烏兎讓輝到海坐通於銀漢魚龍吹浪走盤疑是於明珠然此一㸃金色光盡在諸公筆頭上懷沙包黍何勞招屈子之魂逐浪生花又可誦坡仙之句餘明所及幽壤咸歸普度告盟榜寳月重圎始停玉斧春風九夜爰啓金科肅肅乎塵馬不飛飄飄然仙車無跡五難縁理去三炁攸分十方浮空來一珠俱攝中有自然造化於焉溥度幽冥鶴信曉通龍文雲起愼終追逺具陳潔巳之誠心脫苦登眞仰止度人之妙道時其可矣天實臨之萃善録卷上
