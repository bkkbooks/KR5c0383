  text: 萃善録卷上澄五
  hash: sha256:6f69bc599c18cc4b6f1b15f8e35ab5ec9cb9adacbebce5559c088c2090f54f1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0383_HFL_001-001a, image: hfl/0617/0617-018.png}
body:
  text: 聖節祝君之詞聖人生焉瑞繞紫樞之電上帝臨汝喜開黃道之雲齋肅陳詞明晨有請伏念新傳祖印逺覲宸廷香頒龍虎之壇親承上旨壽祝麒麟之殿未遂南轅命玄侣以修齋對威顔而歸美恭願緑章夜逹來仙仗於清都丹扆春融永丕基之洪福謝雨詞布地為壇土皆作玉望雲請命天乃雨珠生意頓回元功不宰伏念自名以道待飽於農凡仰愧俯怍之餘有春作秋祈之望屬以亢旱異於曩時既自郊而徂宫禱之久矣庶匪朝而依夕苗則勃然蓋移粟之民已疲倘荐飢則歲何仰不違咫尺遂俾雱𩃱返神水以安靈薦潢汚而報本伏願賜之終惠保此有年自三日巳往為霖更漙餘波之潤無一夫不被其澤同為樂國之歸天師在京就山還醮君命不俟駕阻瞻咫尺之清光皇天無𥝠親妙運兩間之元化敬緘香於帝里歸奏牘於宗壇伏念慶籍世資叨傳祖印言尤行悔顧教法以多違家難命竒致災非之荐見幸際龍飛之治遄為驛傳之朝孰謂微痾竟淹半載思切宸旒之寵對聿嚴靈寶之齋修謝過消災祈恩請命伏願帝心簡在人欲必從鑒其悔艾之𥝠錫以生成之造真風赫奕日深丹扆之知新渥駢蕃露重紫泥之賜凡存志命悉宥恩庥酬禳火醮詞庚午年吳皆春夢見崇禧廳前有一物又遇竹軒魂歸乃云其房當有火火久軒遂許醮獲安夢而占夢同知幻境之無憑疑以傳疑敢忽前車而不戒昔焉徼福今也酬恩伏念求木苟完寢薪是懼彼蝶化之紛紜莫詰聞者隱憂况鹿隍之失得或然愼之為貴乃以恍惚杳冥之故而為和平安靜之求帝示矜容人思報稱伏願𥘉盟克踐終惠允諧曷日而忘永戴風兩帡幪之造惟天所命密符祖宗香火之心德布春陽恩沾莫景天師慶成藏殿醮詞道機無息乃春殊庭法藏韋新實依玄造爰慶成於一醮庸籲告於群真伏念切已興思拊躬省過或以前因而今受或謂寡是以多非或下情宿怨而罔知或隂隲可為而自失或命身之位與孤曜以相逢或嗣息之宫背吉星而不照乖違至此懴釋何由謂寶藏經營信斡旋之有地况真斿森列可運轉以回天幸人巧之成功希聖明之從欲肅陳凡悃恪露中誠伏願霽仰威顔春生容德造化無停輪之理變通於轉轂之間八卦凝神見乾坤之六子三陽發秀回否泰於一時錫命在天俟恩即日吳惟德薦母客途天逺空馳遊子之心鄉岫雲停不見慈親之面俯遵玄教仰叩淸都伏念淺矣學仙闕焉事母將謂轉蓬苟得尚酬菽水之歡豈期泛梗言還遽灑萊衣之血揆一子出家而奚益幸十方救苦之不誣愍日適臨沖科特啓伏願珠浮獅坐玉揉龍章蓬島回車喚醒虛無之夢桃池侍宴容登快樂之鄉魂氣有歸後昆允賴建九幽正醮詞物莫預知痛先臣之棄背情惡可巳祈上帝以超升言不成文泣盡繼血伏念父吳霜未老燕璞何仇孰謂無牙而藴至深之毒乃傷其指竟罹罔極之憂豈其遺㣧之不天抑亦患身之有數丹心耿耿不能鳴沒世之悲玄範恢恢庶以慰重泉之望澗芹可薦鑒藻無𥝠伏願開解脫門指虛無路宿𡨚氷釋扼喉敢起於妄心逝魄雲升錬質全資於善果率行正道惠迪後人仙姑薦父母父何怙母何恃嗟永隔於歸寧乾資始坤資生冀重開於化育三熏請命九拜投誠伏念季女有歸二親莫贖謭焉洪祀贊善教以利人愓若奉先愧近功而撫已蒿目濺感時之淚草心萌追逺之思明氷具陳恩波允賴伏願大鈞無息至鑒有容地道陽光超椿萱之朽質人元合妙副葵藿之私情周年建醮薦母母兮鞠我蓼莪之痛無窮期而小祥白駒之過何速惟攄哀素上徹穹蒼伏念某自罹陟屺之悲忍見星周之次念升沉之莫測幸拔度之有科謹潔塵居肅迎飈馭伏願雲開黃道風送緑章詔三界以逍遙擁萬真之來下慈光逺被庸昭觀盥之誠明日將朝不盡童蒙之瀆孫秋碧就普度酬所許保安就薦先師祖盧自間追想前猷願有盟而必答寓誠普度思如在以宜超敢食前言輒千上聽伏念有身為患厥疾弗瘳急告于天猶幸苟延於一醮回生無地忽驚巳過於七年逝者逺而許者存心所知即神所記謭焉報貺期以出幽伏願大道有情至真無外指蓬萊路或從織女而歸入黍米中同會天人之樂周圎功果啓迪仍昆陳制帥黃籙宿啓詞緑林戢盜熟小麥以休師皂嶺巢仙潔菁茅而事帝科嚴修於玉匱事宿闡於瑶壇伏念謬以撫綏任兹討捕謂人為天地之貴何忍殘生若賊遺君父之憂是名負國爰親從於士卒偶活致於渠魁雖幸凱還能無濫殺報風聲鶴唳之助見莠除苗長之仁伏願旋斡雍熙銷沈乖盩兵凶器用非得已一空白骨之𡨚利公家知無不為洞鑒丹心之素三朝詞涼生蘂殿夏五月以風薰梵繞芝壇日三朝而晝永嚮天威之咫尺贊君德之輝光伏念某叨竊寵靈周旋軍旅僅解嚴於汀建復蓄鋭於洪虔蟻冗就焚幸凶渠之檻送龍顔動喜因捷報於驛聞兹闡事於閣峯敬歸功於魏闕伏願皇天佑宋舊境還周萬化更新見君臣之慶會五兵寢息增朝野之歡娛晚朝詞細柳除營甫定積年之寇白楊悲隴莫招長夜之魂即福地以修齋遡昊天而瀝懇言念盜興於贑人死如麻就縳抵刑自速藁街之戮摧鋒陷陳多銜草野之𡨚在臣意者以拯民惟帝相之而破賊殺非得已生亦無窮伏願大赦幽牢普超苦爽五方異俗化金革於農桑三代同風混車書於禮樂宫門驅蝗多稼連疇意豐登而可待群蝗入境乃侵齧以為災民命所關帝心斯在言念大江之右夙稱樂土之中邊國粗寧幸免軍需之急浙鄉不熟已傷官糴之繁正望稔於此秋庶全生於爾衆屬蝗蝻之大孽遍滿鄉閭顧蟻蝨之小臣主持宫宇力捕莫施於坎地醮禳惟謹於祈天伏願哀憫衆生赦原萬罪羽蟲揖揖掃除勑田祖之神寶穡垂垂刈穫錫農夫之慶矢詞迫切拜賜須臾顯應觀設醮祈晴詞望霓有禱既賜雱𩃱積潦不收遂憂昏墊眷浙人之宅土即澤國之圍田凡雨過多雖苗無秀矧江潮之齧岸加湖水之淹廬因沮洳以復隂將鬱蒸而成疾天子側躬而軫慮計臣思戢以遑安肅闡醮筵恪陳奏牘伏願乾坤軒豁離曜輝光農務三時訖暑耘而秋熟王畿千里保物阜以民康明堂預告設醮祈晴詞君國子民紹一元之大統父天毋地嚴三世之親祠爰合祭以戒侯用前期而申禱伏願璇穹秋豁玉燭時調上帝降祥禮迄成於重屋沖人嗣服祚益茂於丕基顯應觀祈雨詞民亦勞止春失種以無秋天何言哉日常暘而不雨深惟闕政祗控危𠂻伏念護漕罔功來歸未遂星流白晝屢傳旱野之占氣入朱明愈急水田之務既群祠而遍禱惟上帝之求哀伏願勑下雲雷澤盈溝澮貽牟播穀錫嵗事之豐登合璧連珠示乾文之嘉瑞如乖吏狀請罰臣躬顯應觀再設醮祈雨詞農時既失旱太甚以如焚天聽孔卑信未孚而弗福故忘煩喋仰叩穹明伏念兩儀漕畿孤忠體國經費倍支而罕撥叨榮宜去而復留浙西東粒米之鄉所祈豐稔夏仲孟梅霖之景乃向焦枯暴巫徒市莫效於人為呼雷召龍率由於帝命既瀕湖而醮欵祈沛澤以昭蘇伏願敕斂驕陽恩敷甘雨水耕火耨亟施田畯之功粟腐錢流汔濟邦儲之用尚諧中熟庶弭多虞代茅山祈雨詞年穀垂成政需澤潤秋陽為沴反病亢乾即仙聖之所居為𥠖元之有禱伏念濫膺顓閫兼領陪京維時多虞所望一稔序既當於揫斂田尚苦於燥剛始自近郊逺連並塞地綿千里皆懷卒歲之憂帝監四方忍絶斯人之命使旱勢遍臻於屬部恐咎端專在於微臣實震懼之靡寧冀精誠而上逹伏願普敷德澤遍惠群生哀此矜人久服勞於穡事沛然下雨俾無廢於歲功開元宫禳火詞流星隕晝仰天戒之髙明比屋延燒傷民生之蕩祈肅持惻怛上告穹蒼伏念無輔使家僅尋時瘼泉務流而乃壅巳病閭閻火弗戢而屢焚仍空蓋藏維商丘之有祀祚宋國之無疆爰修瓘瓉之儀祗欵琳琅之駕伏願誕施仁愛潛弭災虞地大京師息融風而奠枕春深田野賜膏雨以催耕禳兵詞洞冗無知輒起緑林之盜封疆所界深懷赤子之憂仰遡皓穹肅陳危悃伏念典州踰歲闔境逢年鄰寇鴟張毒忽流於塗炭凶徒鼠伏釁將動於蕭墻荷天敗其逆徒尚日馳於警報王宫陷逐寨卒創殘居多控扼之兵未快蕩平之舉敬為民之請命輒籲帝以投誠伏願赦過一方全生萬衆厄會密移於天運先聲克壯於軍容殱厥渠魁稍謝無辜之鬼安其田里咸歸不殺之仁祈皇嗣南靣視朝久嗣大君之位東儲繼體宜膺男子之祥屢醮禱於蒼穹佇感通於禁掖即太乙貴神之館合下元本命之辰申𩛙羽流恪陳朱奏伏願帝心顧佦國脈昌隆帶韣授弓駢集椒途之喜承祧主器允符瓜瓞之綿章尚書九幽醮詞劬勞念母德至大以難酬哀痛徹天道無方而善應輒修清醮恭瀝丹忱伏念亡母懿行在躬先臣同齒子七人而保抱忠孝良勤孫三世以團欒慈憐僃至湯沐既開於鄰國旨甘粗適於偏闈上壽以傾諸孤之釁顧微軀而若失更再訴以增悲敬遵玉匱之科荐剡緑章之奏伏願恩言曰可過誤其空風起白楊不待幽阡之閉火傳金籙亟超樂土之生下及漏泉旁沾餘潤方司法五七詞女子有行所期偕老吾夫又死幾不勝哀舉塵案以自憐寫録章而上奏伏念亡夫甫沾寸祿沓失層親枕塊纒悲方經營於逺日臨塋成疾竟殞滅於芳年痛兹家室之情慘甚戶門之禍孤嫠無倚痛泣何聞伏願降鑒哀恫赦除愆妄度此魂於生地仍識天倫撫弱子者寡妻常依道廕陳帥玉隆宫黃籙宿啓詞視事惟新未靖緑林之寇感時多故輒修黃籙之齋躬造福庭宿開靈墠臣丹心君上白髮兵間閩部解嚴𦍒君民之肅睦江墟徙鎮傷飢饉之荐臻豈生靈積過之滿盈抑官吏貪殘之由致祗醮神仙之宅覬回天地之仁伏願玉燭調和珠𨇠循軌上固一人之壽下全萬物之生洞孽就平師不煩於久外田禾告稔臣庶獲以偷安天曆為宗師還保安醮詞北望鴈書想玄門之宗主東瞻馬首祈洪造之真靈應不逾時報當知本伏念進修在已行止非人司教日邊每盡扶持之力縻身關外適當間隔之時嘗徼福以籲上天乃蒙恩而有今日端不由於幸得何敢食於盟言敬肅元壇恪酬清醮伏願國經求舊帝渥從新教雨載濡納道山於九潤壽星一點映台象於三階天師留京建年經詞日之餘歲之餘幸依光而及此邦必逹家必逹期徼福以皆然且謝且祈如臨如履伏念某朝君身逺祀帝心長時荐易於年華德難忘舊天密胚於道脈恩企迎新恪陳藻薦之誠默寓葵傾之悃銘藏匪報鑒照惟明伏願洪造垂仁皇都協慶生成一致門迎佳氣之春出處兩榮驛寄喜音之早誓修隂德仰答元功解壇詞人間塵世嚴祭祀之瓊壇帝所清髙下照臨之玉節朝儀已僃齋事告周禮貴節以成文義有同於既灌伏願皇靈穆穆鑒觀趨退之恭師造昭昭察宥愼終之典謝恩詞一陽來復父初索於震男三願幸孚帝下觀而臨汝此恩此德何報何言伏念某素欵既周皇靈不昧雪先呈瑞餘半月以俱晴日暖如春後三朝而乃雨皆神明之所感於氣象以可知況凡我同盟相終始於陟降暨百爾執事咸進退以安間非由臣意簡在帝心何以天時合於人事載熏載沐且謝且祈伏願鑒藻有開澗蘋惟享幾微發見驗所欲之必從兆朕萌芽信不言而善應代人保疾詞疾病同心義重扶持之日愛慈異骨誠祈覆燾之天惟帝納言以人從欲伏念某力開道宇身積患端風為末疾之根外因猶淺疾有逆流之水逺慮實深未收功於參术之竒曷滿望於桑榆之晚掃觀庭而蕆醮欵鸞駕以希恩伏願仙墨香留神丹霧散天醫臨地醫會有藥長生福星明壽星髙如椿難老瑕疪一洗膏馥同霑庚午年春舒貴和捧御香入山建金籙大齋宿啓詞皇天后土既全付於丕圖名山大川庸聿嚴於外祀逺馳一使祗格三靈當鼓鐘玉帛之初陳乃圭璧琮璜之具備昭其文也寓乾坤宗子之心神而明之為社稷生民之地早朝詞申明春令爰攄朝日之誠寅畏夙興敢替事天之敬仰觀非逺默感而通念有民何賴以治安亦惟帝實為之主宰天高星逺行五緯以無差地利人和鎮八維而不動午朝詞離文明兩如日再中乾道時成惟天為大肅使華而代祀仰帝闕以趍朝願感至誠聿嚴善應一民莫非其有天與禎祥萬物各遂其生日依化育晚朝詞纂圖御衆不忘夕惕之思分命祈天益謹暮朝之敬緘一誠而自逺貴三極以潛通密勿之間對揚斯在國經咸若尚聞堯壤之歌皇極無偏丕錫箕疇之福正醮詞社稷艱難叨承基緒山川禋祀曷答穹祇念有土之多虞揆為君之不易赤子備嘗於危殆凶年不免於流亡無以回天豈其能國敢寓誠於一醮庶悔禍於三靈啓迪時幾願示小康之效昭蘇邦本即開大有之祥生聚敉寧治安馴致壬申聖節宿啓詞誕彌厥月揆𥘉默軫於中懷欽若昊天報本聿嚴於外祀乃馳使幣祗醮仙壇修五禮以如方祈三靈而有鑒盛德在木載揚發育之心明日將朝荐啓敷宣之目早朝詞夙興惟謹致祀帝之𥘉誠旰食靡寧以保民為先務托玄科而請命見宗子之用心懷在有仁念兹惟帝五風十雨得中道之豐登四海九州足小康之資聚午朝詞日中則昃戒實在於滿盈天聽孔卑念孰為之保定國有與立時方可為奉金籙以祈恩啓丹扄而事命惟天孚佑益開享祚之祥率祖攸行訓至寧邦之盛晚朝詞日之餘曰夜敢終怠於朝儀國之本在身忝丕承於明命時臨初度齊啓沖科寧無自求多福之心所願密注長生之字大恩曷報躬行遵道之言終惠有祈誓體代天之責正醮詞日當再育忝分光嶽之靈天無常親密運基圖之重撫時以感出命而祈翦焉夜𥧌以夙興比者冬行於春令孰為民極固不止水旱疾疫之憂自揆國經何以逭修齊治平之責林然庶證叢於厥躬乃修外祀之嚴願格三靈之佑有人有土志維綏靖之求而國而家身見隆平之效聖節宿啓詞三日天氣新揆於初度八荒開壽域保運長存香霧空濛真風演迤遹金人捧水心之劔建瑶壇懸黍米之珠宿啓沖科仰關宸慮伏願三境疏恩萬真降鑒九五福曰壽九五福曰富廓寰宇以為家八千歲為春八千歲為秋長上古而不老朝詞聰明作后虹流上巳之辰馨香感神鰲抃普天之下來皇華於福地肅金籙以祈天稽首紅雲投誠青祝恭願星輝海潤開壽富於三宫山髙日升育人民於九土又五道惟欽謹緘香於福地帝心簡在祈眷祐於皇家俯瀆緑章上陳玄鑒伏願咫尺若臨卑髙罔間不言善應隂陽順而風雨時至治無為股肱良而庶民育天曆祝聖代天作子方當繼統之𥘉繞電有期預至祝𨤲之請伏願清時偃武黔首歸仁甲兵洗衣裳垂太平有象日月光山河壯萬壽齊天閣皂山國醮詞天錫九疇撫下期躋於壽域國專七祀升中爰即於名山眷膺金闕以定四郵及在玉衡以齊七政皆隂隲下民之力致虔昭上帝之心伏願八表又寧三宫益壽天地平而元氣正俾萬物以無疵隂陽和而庶類成資一人之有慶早朝詞浴咸池出暘谷現赤日之九芒排閶闔入帝居覲紅雲之一朵眷宵衣而待旦吹暖律以回暄逺馳奏事之香待錫治安之䇿伏願福持寶位慶浹璇宫慰安向於龍樓贊休徴於鶴禁陽分隂而二儀立衍億世之皇圖正得秋而萬寶成洽八方之𥠖獻午朝詞日至昆吾而正中克成厥象風駕扶搖而直上敷奏以言矧金鐸之息聲暨玉衡之順軌用殫朕志簡在帝心伏願俯贊皇猷誕敷文德六府三事允治丕弘有求之基四海九州攸同共樂無為之治表榜正薦太隂表生明合德運天一之至精懸象降靈行地中之漙潤恢恢真造泯泯神機某臨照隨人盈虛有道廣寒清靜嚴七寶之髙居明水苾芬叶方諸之大用欲成玉錬九生之妙必資金波一滴之餘共望澤潤下滋類從俯應天與形道與貌必符造化之全月為魄日為魂不越隂陽之外陶鎔允賴俯仰知歸鍊孤魂第九夜天尊表副玉匱盟真超幽魂於九地寶華應號證道果於諸天仰瀆宸聰俯攄齋悃共望玉京育秀瓊闕騰芳萬寶裝嚴仰彌羅之梵氣九天照燭開幽暗之昏衢魂度朱陵慶流後裔黃籙榜語迎真六琯浮春一陽來復九關戒曉萬聖齊臨方黃壇望幸之時正紫氣開先之際將恭清道仰止浮空雲漢昭回神氣運風霆之表天地明察衮衣流日月之光方域百靈起居先路瑶壇絳節久凝蘂籍之班玉几紅雲一鑒松花之會監門榜法門廣大曽何間於戚疏帝所清髙若不違於咫尺必恭敬止盍歸來乎莫問子為誰孰云身是客衆妙非妙於此示寂然不動之機至言無言亦豈有甚髙難行之事好共看天人黍米信本無風雨蓬萊潔已從之致身易爾塵世茫茫汲汲何許是到家時玄關直直堂堂這裏有入門處神明懋戒凡聖同歸天醫榜世之最苦者曰窮民偏多疾疢天果何為而有醫道默與主張至於遊魂為變之時亦有仰首鳴號之意想神農想軒后九霄難問於髙居如秦緩如越人千載猶存於生氣玉皇之上藥三品金碧之大丹九還輔造化而禆隂陽有神氣而無形迹洪惟天法道每垂情於癢痾疾痛之間莫謂鬼非人重施力於神聖工巧之外贊彼元化相我齋功沐浴榜詩人吟玉女有盆只要洗頭漁父答大夫此水但堪濯足皆非盡善不可效尤蓋隂陽顚倒之坎離其功甚大况一六生成之天地得氣最先飮之者冷暖自知掬之者清涼無盡是名沐浴具體設陳秋入肺肝五內灑金莖之露冷侵毛骨一壺浸寒玉之氷對之而塵垢自消因得以形神俱妙非如春暮果從沂水以詠歸豈比華清笑出溫泉而拜賜脫然無我洗者是誰監生榜太極肇判乾坤定而六子生元氣散分隂陽交而萬形具惟人最貴所主有神以其為天地之心果誰執造化之柄茁籣可愛皆由萬靈恭奉而來坐草云亡或出一念扶持之外未脫秋瓜之蒂莫回寒谷之芳秩秩有司化化無迹子知向來夢應作如是觀靈芝本亦無根到此好參衆妙桃花自貪結子教人錯恨東風淨灑灑然長惺惺去監齋榜黍稷非馨吾聞其語粢盛不潔士聽無譁天地之道昭昭然鬼神之情洞洞爾非誠莫享在德宜酬蓋芬苾具陳雖松華而不棄若馨香可薦縱藴藻以無嫌然勞薪之火其可以炊而埃墨之飯安敢以祭况失飪不食聖人之教訓宜然苟聞腥于天上帝之崇髙則否致其潔也將何道神而明之惟汝賢尚昭乃勳毋曠厥職道腴非味何求昜牙之知食指欲嘗罔俾子公之染雲厨必戒天爵宜升茭郭立茭郭以欵幽魂一期兩見到蓬山而聞妙道千載重逢流年擲梭紅顔春樹人生能幾何朔風驚沙枯梢號寒子行亦良苦四海兄弟一會神仙曩者玄師曽指幽關之正路今兹教主又宏苦海之慈航以何因緣得此方便生我所欲也義我所欲也幸逢兼取之魚熊貴者驕人乎賤者驕人乎勿效相持之鷸蚌雪匙可以適口雲笈為之洗心道味悠長善端呈露天寬地大曽何夜雨煩𡨚隂極陽回别有春風消息孤魂榜莊子嘗言受成形而形有盡阮瞻所見論無鬼而鬼不然則知二氣之良能難以一途而偏廢伯有彭生之事古人豈欺我哉魏其灌夫之𡨚信史有如彼者生生死死古古今今金谷園林此地豈無歌舞平泉花木幾人看到子孫逝川只解東流白日又還西落曰鰥寡曰孤獨况下民多無告之窮或札瘥或天昏而上天之剝喪者半艱難萬狀貧病交攻其間浩歎何勝到底同歸于盡以無祭主故曰孤魂幸今逢黃籙齋官又特啓玄科好事飽汝以食而無餒暖汝以衣而不寒三十六部尊經善緣得未嘗有一萬二千金簡魂氣當無不之仙道佛道儘堪行天門人門皆可去黃壇回首處快乘蓬島清風丹府記名時盡入黍珠碧落皆大歡喜便好超升將吏榜雲篆太虛道因文顯風霆神氣將以心存况兩間光嶽之散分有一揆天人之會合魯公竟為雷吏傳説自是列星李將軍生不封侯其必在爵秩同升之列張睢陽死願殺賊將亦發英雄未了之心雖道之體本出於自然而法之用實存乎策役瓊臺拔地玉輦瞻天金簡合符寶書啓鑰于以廓靈風而昭慧日于以引歸路而濟迷津九幽之黑處皆明一寸之丹心默契惟道貴度非神不行作善降祥馴致仙家之喜慶論功行賞超遷天上之班資節次榜齋以事帝固宜由本以及文道不逺人其可有綱而無目眷我黃壇列職無非紫府朝班秩秩有儀諄諄以告言而為法動而為則當如君父之在前舉之於口筆之於書須信神仙之可學必也周行中規折行中矩勿謂視於無形聽於無聲謫果何尤黃庭之誤者一字過無可奏庚申何畏乎三尸相與盟天有如皎日茶榜問海上靈槎光彩巳騰於星漢擷山中瑞草芳香又接於蘅薇䇿上品之竒勳吸群英之佳氣共惟天師胄承漢葉器備仙根道味精微灼見中𤃩之水善芽茂密未論蒙頂之苞紫蘭香桂之所依朱草嘉禾之近侍輕雷破莢蘇醒群昏明月為團晶輝獨露一飮者巳量俱足共談而舌本潛通曵翠旗按蓬萊清風兩腋執蒼璧朝閭闔喜徹九重遲遲三丈之日高欵欵五千之文進佳句自聮於石鼎貴名又起於金甌白雪滿碗花徘徊小引鼻端之馥仁風暗結珠蓓蕾早回掌上之春點首而前瀹心以進酒榜黃壇設醴洪鈞轉而一陽生玄館飛觴大禮成而諸福備竹松如醉猿鶴歡迎共惟天師雲氣尊罍道山鍾鼎聖明時和熏甘露神仙府瑞靄香風舉瓢酌天漿神情邁俗停杯問明月逸興無塵混融乎青州鬲上之分浹洽乎玉瓉黃中之妙沉酣道味醖藉仙風有盎然深念之良心便釀就滿腔之喜氣輿人傳頌何須論千日竒芳天子呼來又欲醉九重春色想宴罷鳯邊丹詔記賜來馬上黃封敲玉壺氷想道臣心之如水指金莖露笑看仙掌之凝珠鬱鬯味濃蘅薇香近水燈榜水燈映水開成仰覆之蓮花天影粘天照見虛無之蓬島九淵不夜千炬浮春烏兔讓輝到海坐通於銀漢魚龍吹浪走盤疑是於明珠然此一點金色光盡在諸公筆頭上懷沙包黍何勞招屈子之魂逐浪生花又可誦坡仙之句餘明所及幽壤咸歸普度告盟榜寶月重圎始停玉斧春風九夜爰啓金科肅肅乎塵馬不飛飄飄然仙車無迹五難緣理去三氣攸分十方浮空來一珠俱攝中有自然造化於焉溥度幽冥鶴信曉通龍文雲起愼終追逺具陳潔巳之誠心脫苦登真仰止度人之妙道時其可矣天實臨之萃善録卷上
