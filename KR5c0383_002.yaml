body:
  text: 李氏崇建九幽升度大齋薦拔亡夫及子孫孤魂正醮詞禮慶夭昏死生大矣齋戒沐浴天地臨之巳蒙金簡之曲成庸闡瓊科而昭謝伏念臣妾得天何淺惠妾無終兩年而有七喪夫亡子繼一身而哭三世女殞孫殂間逢疾狀之可疑或謂患端之有在神靈震怒災禍頻仍身不敢以遑安心實知其有罪亦嘗潔巳津六道以消愆孰若投誠醮名山而請命皇穹在上明水自陳伏願道有生神仁無棄物仙科九錬感歸解脫之門人道一新永塞伏連之路蒙恩有日積善酬天宿啓詞上帝至仁常恐乖違於人道凡民有死猶傳濟物之真科何垂老而兼失於所天彼長逝者孰開其生地乃攄丹悃祗肅瑶壇五幕風微幸綱維於玄範九關雲啓容朝夕於清光早朝詞好生德大感上聖之垂光追逺心長肅初朝而請命旦氣接天人之會陽明通造化之機三極神交九原慶幸玉文布勑爰指路於仙靈金簡流丹式合符於凡悃午朝詞事帝夙興致齋忱而未悉趍朝晝接訴家難以申言比由外患之干而有中殤之哭省愆終日悔禍惟天否塞潛通北斗弭伏連之路離明洞照南宫升解脫之魂晚朝詞夕殿澄秋監人生之多難朝儀卜夜奏童瀆之微言道開幽壤之光明德沛餘波之膏潤允資既往兼惠其生天定而人景幸收於榆晚日昌厥後春益茂於蘭芽元君薦三十七代天師希微宿啓詞嗟子行役竟客死而不歸惟天聰明念民情之無告倚門望絶啓醮詞真伏念某人嗣教三年束裝萬里藉祖宗之福澤偶有遭逢嬰疾病之淹留胡然天喪心拆外書之至神傷旅櫬之來母子至情死生大事敬歸依於祖教先汛掃於家庭伏願四氣朗清五文開廓北方不可久處帝遣三招東極無量度人經傳十遍二日早朝詞曙色蒼涼不見衣冠之拜母凡情懇惻正慿箋牘以籲天儼十方三界之臨正二日六朝之始伏願陽者普照勑札下頒報冀朔之遊魂許從雪注蓬瀛之仙籍得遂超升午朝詞日之方中缺望晝歸之錦神其如在揭虔露悃之香哭子聲悲望天情切伏願玉天賜敕金闕疏恩大開流火之庭盡除宿垢入侍太玄之省得遂超升晚朝詞時當昏定長兒不見於寢闈醮有晚朝列聖尚臨於壇席恪遵教範昭格上穹伏願夜氣澄清天真登引神魂可度願永遂於逍遙母子有緣或相逢於夢𥧌三日早朝詞林迎曉日傷情看返哺之烏壇望昊天𠾑赦想朝陽之鳯沐熏皈命俯伏祈恩伏願閶闔廣開圭璋入覲念陽平之遺裔俾綴仙班受玉局之真詮親聞至道午朝詞日景舒長愴南去北來之異路天威咫尺監母老子幼以何心明水再陳哀情深切伏願符頒玉陛勑下朱陵乘飈羽以歸來略思舊隱入寶珠而聽瑩頓悟昨非晚朝詞白髮青燈永斷持環之夢金書丹簡爰依錬玉之科夜景閴寥齋功圓滿伏願乾文粲布帝澤廣宣遺世登真既返天地山川之氣説經授道應悟死生晝夜之常天師入覲回山奉旨修金籙齋宿啓詞皇帝若曰敬恭卜日致山川社稷之心禮樂事天備玉帛鼓鐘之實乃三極交孚之際當一氣戒肅之初於行用金其土皆玉端倪仰止德曷敢於二三戴履孔昭威不違於咫尺雲車穆穆星幄熒熒錫命會同神合吉時合序降祥茲至日重暉月重明七政咸齊五兵不試早朝詞日出寅賔堯則天而為大天休申命湯銘日以能新存旦氣之清明秉晨朝而齊肅有神如在惟帝念兹斂福群生期不孤於皇極書年大有母專美於春秋午朝詞離文明照仰承並日之言乾象髙陳敢替奉天之訓神洋洋其在上皇剡剡兮揚靈玄極受朝清都分命神州國本鎮九有以不搖畿縣民風張四維而大治晚朝詞一信始秋當莫朝而曰夕寸誠獨露存夜氣以事天沖漠之際無𥝠密勿之間有命丕承率祖克相厥家黃屋非心允賴弼基之道明堂坐治敢違輔德之原正醮詞國稱宗子若重器之在躬父曰嚴君宜平居而請命時措敢違於責任日宣密謝於扶持禮以逹言誠惟克享民胞物與同流一視之仁俗美政成丕顯三靈之德千秋節宿啓詞丕承任重繼體乾坤載育惟時潛心天地誠逺將於玉帛儀祗肅於瑶臺夙清下土之塵俯俟髙穹之命瓊輪出警鸞和側聽於宸遊金籙啓玄鴻造不違於夕奏三朝詞惟天孚佑下民日省青宫之寄自朝至于中昃寅恭紫極之朝撫已實生效心逺致冀神靈之委鑒綿宗社以流恩五學身修夙懋成人之地兩官眉宇春融問寢之天正醮詞國本承祧責任敢違於繼述王春育質主張實兆於生成臨誕日以遣香儀即名山而修金籙惟天不隔若帝之臨監國撫軍極扶持於內外問安侍膳全忠孝於君親宿啓詞官占象緯馳使命以有嚴方鎮龍章按壇儀之初肅雲閣琅霄之雨塵消金殿之風帝命春融國忱夕奏一體班行之序明日將朝九關輦路之光惟天所命早朝詞升日車於黃道曉肅朝班擁仙仗於紅雲空浮御路致國家之忱悃禳火土之光芒雖君德自可以回天必帝命以先之為地星當翼軫集百順於皇躬月在晉秦合三方於洪福午朝詞天文推步國禳太史之占春畫朝元使肅近臣之敬祝𨤲者臣之責任懼災者帝可轉移對越修辭敷宣待命首尾違行天道星不沴於坤儀吉祥茂集慈躬德永禆於乾御晚朝詞司曆占星窺祲氛而奏上奉祠祝國存夜氣以朝元惟熒惑之留退靡常而玄科之禬禳可用網維有在回斡非難主鬯無虞藹春暉於花蕚承桃有慶動喜色於楓宸正醮詞乾稱父坤稱母臺占留退之𨇠天成象地成形國有祭禳之旨玄範俯陳於瓊館緑章上奏於清都分命星辰流恩君后片言退舍母專美於春秋一氣居中永鎮安於民社福沾聖嗣慶衍宗枝聖節詞欽若昊天式付纂承之重無疆歷服深惟克紹之艱揆𥘉度以再時爰省躬而事帝齋修金籙文啓瓊科視聽弗違巳罄朝元之禮監臨有赫庸殫歸美之誠遙睇碧霄重敷緑奏伏願玄功不宰玉曆綿洪隂陽調而風雨時群生胥樂股肱良而庶物育萬邦以貞保生度往醮詞稔愆降疾伏地省躬追逺固存籲天請命寫丹心之耿耿瀆玄聽之髙髙伏念尤悔積中天昏逮下遊魂為變死者不可復生天患有身存者其能自保兩端危急一揆憂惶爰潔志於名山祈通情於絳闕科修金簡醮欵瓊輪伏願丕顯至仁曲垂三宥救苦之符廣大出苦無他好生之德克周延生有自克昌家脈永戴天恩丙寅普度齋宿啓詞體天地心撫三春而悲九夜即神仙境由千里而致一忱玄範𥘉盟緑章敷奏伏念以平心而處物將推已以及人側聞名山漙度之常政協寸地永懷之自謂甚堪憐憫魂而不祀者則為孤倘遂可超升親而當思者其敢後前言如日中誠契天既嘗昭告以率先敢不躬行而善始壇規氷肅輦路雲開伏願五氣凝真三靈合德玄風發育又開太極之初道月光明洞照重隂之表早朝詞帝館雲紅普泉曲希陽而度仙階土碧肅班行戒曉之朝日下照於傾葵春不違於一草更生之道無息者天明荐起於東方有如此旦樂莫加於南面奚取斯言午朝詞道妙畫前之易相見乎離陽生貞下之元以觀其復望丹靈而請命希金簡以成功三氣有融一光普及日魂既錬了然以出於機天性無違超乎而會其極晚朝祠鵷序星羅立夕儀之濟濟龍章露奏浮夜氣之融融存誠殫事帝之恭演教襲度人之大慧光燭下心體鏡如玉字䇿勳又覩三生之日月寶符度命重開四象之乾坤正醮詞雷動雨盈幽壤之煩𡨚頓洗天明地察玄門之善利無𥝠惠澤潛符齋忱允遂伏念服膺妙道引領真科莫得而名者固非常名無所不度者是為漙度乃啓如心之恕以干成物之仁東極楊枝密灑清涼之餘潤始青黍米中含發育之陽春變法雨以㴠濡噓靈風于枯朽巳著顯然之功用必無不濟之幽冥菲薦庸陳隆恩曷報伏願九真慶會一德昭融大道可以情求人事盡而理現本心所發敢窺天地之全庶物咸亨孰外乾坤之大就普度會酬醮超度詞母子至情嘗致抱病保安之請幽冥異路罔殫愛生傷死之思一謝一祈三薰三沐伏念臣亡男某草茅賤質蒲柳微資偶違攝養之方久困沉綿之疾遂同夫主仰告皇天念駒犢之可憐冀鴻厖之默估豈期夭折糜藥石以無功相繼凋零痛藁砧之傾世莫逭未亡人之咎竟乖元徼福之盟兹逢普度之齋筵回助往生之善果伏願蒼穹錫鑒黑籍銷名日居月諸用助孤嫠之𥘉欵父前子後同登上品之仙階五真人薦成舍人天垂濟度恩不間於幽冥人有懇祈事每關於傷悼一忱請命百拜陳詞伏念臣亡孫某生也時乖死而日逺襁中抱養本為繼絶之謀冠後擬婚遽作永歸之訣泉壤之塗既隔母孫之念何窮兹巳及於大祥敢肅陳於清醮爰資薦拔俾遂超升伏願紫府洗愆玄功錫造性天朗徹廓除宿昔之沈迷法雨載濡漙及邇遐之枯稿凡兹靈識同一逍遙會首建九幽薦親宿啓詞日往月來思親念切天髙地厚追逺心長求大道以有門醮名山而告簡愚誠宜致師造曲成瓊篆發光靈寶之科肇啓玉書錫命朱陵之路常開不次之恩莫窮之報三朝詞乾始坤生天獨存於瀹祭夙興夜𥧌日三接於朝儀賴仙科成物之仁啓子職報親之禮俯陳凡悃仰答真斿惟孝感于神明鞠躬兹愧謂生同於夜旦撫乎知歸正醮詞斡旋人道生生之造無窮瞻望帝閽嶷嶷之忱惟謹恭趍仙境俯控丹𠂻伏念蒿目懷親草心遊子昊天罔極莫回長夜之光明春雨既濡益重九原之悽慘况本根之難泯在眷序以攸同慿金簡以出幽途遵玉符而開生路恪陳清醮祗答洪休伏願三氣流光一元啓運物觀其復又分太極之天光晦而明載育中華之地銘心從欲種德酬恩薦孫真率宿啓詞追逺何由教育之原敢昧出幽有造超升之望焉依庸歷寸丹恭祈三寶伏念先師某生惟任直死亦無他人事莫齊美惡難調於衆口世緣多妄晦明或昧於本心懼寡過以未能率下忱而有請乃修玄範昭潔瑶壇伏願教道所宗師真實主玉書炳煥照開十地之門瓊駕徘徊來下九天之馭仰瞻伊始望幸無窮三朝詞夙興卜日祈超異骨之親夕惕事天肅致寸心之敬朝端謹飭帝所清髙惟師承難泯於後人蓋道用不違於一物資慿善利接引冥行釡簡通神直指逍遙之地丹臺聽命同遊清靜之天正醮詞授業惟師莫詰九原之下生神有道又開太極之初允荷曲成敢忘大造伏念先師某幻而為果空本無花望冥海之茫洋云何超越賴玄科之方便得所慿依攝先靈以惠來度苦魂而兼濟萬緣解紐三業無根酬恩羞藻薦之恭執禮盡葵傾之敬伏願靈尊克享至澤旁流法身報身一指虛無之路天道人道同為清靜之歸餘慶所沾後昆永戴張國祥薦父終七詞無父何怙嗟為子以略依謂天蓋髙痛思親而曷報日云終七露悃再三伏念亡父某涉世心長謀身計拙惟勞生若夢欲寡過以未能曰度死有科豈遺孤之敢後潔蝸廬而請命告龍簡以宣恩敬寓潢汙禮陳清醮伏願至仁無外洪造有容哀矜追逺之誠恢廣濟生之道太虛蕩蕩漠乎無眹之神長夜漫漫示以自新之路張梧山還保女醮詞惟疾之憂女均為子無德不報人敢違天果符一願之愚敢負𥘉盟之善伏念某昨因女某血滯於氣乳結而癰盡乞靈徼福之心庶幾不死拜度厄消災之賜幸爾更生相攸已遂於宜家醮欵仍書於欠籍乃清塵宇祗肅飈車伏願雲擁洪禧星開黃道門闌多喜春濃甥館之娛宅相克成早滿親庭之望百為兼順二美同榮張資善還玉臺保母疾首弗瘳莫代慈闈之痛矢心請禱幸推金闕之仁禮寶誥以無他奏藥功而有自念拜雖萬萬果何益於昊天然聽匪髙髙實潛通於寸地庸告成於願力爰敬蕆於醮修潢潦至微清都不逺惟帝心之簡在祈母算以增延菽水春暉錫雙親之齊老萱花晚景增百福以攸同何以酬恩敢忘種德還保嶽母醮詞親其親長其長宜休戚之相關道可道名可名信精誠之不隔賴天從欲伏地知歸伏念某昨以外母某疾亟于躬勢危如髮急於問寢懼窮日之後時行未及門乃籲天於中道半子之心如願上帝之德曰生敢食盟言謹陳醮禮伏願壽增寶曆數斡璣𨇠堂上萱椿耐春光而不老門中桃李托餘蔭以同榮永戴璇穹旁沾玉潤黃竹軒提點七十常住建醮慶壽詞大厦棟梁之寄主者獨稱七旬弧矢之期人生所慶以福地寅恭之義致祈天助愛之誠惟帝所從允臣至願壺中日月留不老之春光鐺外山川均無窮之道味節次啓許保安七醮合醮詞瀆本戒三况乞靈而致七敬惟主一庸專志以酬𥘉寓悃緑章通誠丹陛伏念山林之役天地焉休俯省前猷積願言而莫踐適當後繼凛負咎以奚文雖本原所任之責有殊然福利奉公之心則一神豈可負道無不同爰蕆醮以報恩冀鑒情而宥過伏願大造優容衆真歆格謝往愆祈終惠來日正長居善地樂清時惟天所命衆為某保安詞人疾必呼其父母誰使之然仙源端賴於祖宗宜衆以告惟吕氏某以弱質處胚腪之際偶深居失調護之方馴致微痾頗關逺慮念仰瞻推本豈能違師天𥙿後之恩苟回盻資生即自有隨日遺安之道外求則妄至敬無文伏願醮悃上孚奏言下錫艾香越井早收神藥之竒功蘭茁謝庭行見孫枝之喜色綱維有在銘鏤難磨吳宗師丙寅冬捧香回山建醮并慶成三清殿宿啓詞惟天惟祖宗纂承任重有民有社稷定保心長適名山崇帝所之新以秩祀致國忱之逺乃馳玄使祗肅瑶壇昭其度昭其文齋莊有執潛而天潛而地敷奏以言早朝詞至誠望秩朝徹無違大本欲安夙夜以告惟髙厚之氣順則參贊之功存修德承天享誠隨地一元保合時成物象之通三極交孚日永道原之大午朝詞六琯陽生揆國經於治象九關晝接祈邦本於時康蓋有民為兩極之心而立命者一人之責多儀克享明照不違四海永清誕保金甌之固三時不害益綿玉燭之和晚朝詞天付有家修身為本日嚴祗敬遵道而行存夜氣以敷言致夕儀而對越非后何戴惟帝念兹宫壺一和式永綏於內治宗枝百順尚丕顯於前猷正醮詞小心圖治協和之效如斯一德感神望秩之忱敢後屬真境告成於御宇以祠官祗薦於多儀乾文之昭示者欲得其平地利之或乖者盍求其故何以納𥠖元於熙洽何以臻中外之乂安為國有經涉淵思濟每見幾於終日惟助順之在天麟趾應時自省玉成之道鴻禧流慶永依鈞轉之仁一氣還元太平有象丁卯春建保安醮詞福地措躬每懷逺慮雲天垂蔭允賴真靈敢忘燕安防患之時况值蝟集建齋之日葵傾請命藻薦祈恩願憫至情介水官而永鎮相安無事戴淵造以難磨天師退潮預建醮詞省府憂潮致驛書而有命臣門如水率祖教以將行心惟道之是遵事非天而曷濟預陳清醮仰冀洪恩威命煥頒祈早清於海怪教風誕播還舊障之沙隄益固民情永寧邦本戊辰年天師建黃籙宿啓詞黃壇特啓按參天兩地之規丹府具陳酬三世一家之願思過不幾於寡信踐言兼首於前非明察有容顯幽是賴伏願道常善應斡化機於儀象之間聖不可知交神氣於天人之表詰朝而見先事以聞一日早朝祝君忠實答天奉齋科之重典清明在旦謹禮節於𥘉朝假靈不敢以及私贊化先期於報上伏願曉開閶闔日暖旌旗乾符坤珍洽覩垂衣之治天心民命歡吟洗甲之詩午朝臣僚上答天心孫謀子職俯綏國本世治臣賢朝真敷晝接之誠宣化極時需之望伏願慶霄扶日寒谷噓春玉燭順時不出夑調之外金湯固本咸歸陶冶之中晚朝天下齋忱夕奏潔已而言教典夙遵𥙿民為急敢曰遽形於𥝠請幸期先及於生靈伏願昧谷陽生景星光現帝憐赤子春回草木之寒天轉洪鈞日借桑榆之暖二日早朝孤爽昧爽朝元曦輪雨旦大明燭下淵鑒兼融念誰憐遊魄之無歸欲自拔迷津而莫可惟玄科之有道此上帝之至仁伏願慧日乘晨靈風造曉坎納戊離納已乃火降以水升乾資始坤資生又天涵而地育午朝正薦日瑞再中何造朝之喋喋天臨在上敢徼福於冥冥重惟一門謝世之親誕啓十回度人之道玉文有證金簡無𥝠伏願錬質離明超神旅進祖其𥙿後仰承玄省之宗女亦有仙尚𨽻易遷之籍晚朝附薦臣卜其夜仙貴度以垂文人有常言仁者存乎博愛眷道俗戚疏之既往想精神魂魄以何之一指虛無同歸清靜伏願慧光如月覺性俱天幻身非身了取靈明之本無質生質超然夜旦之常三日早朝教門日射金門三覲紅雲之曉露陳玉座一干玄造之春謭焉司教之在躬惕若隨時之為義閏楊相戒戰栗以言伏願遵晦而明依光不昧真源承緒箕裘之學無遺新渥如綸冠褐之宗益大午朝師門兼宫門千年祖教嗣福地以奉祠大易人文列家人之正位相關幽戚均乞平安朝接晝以云三聽回春而采録伏願天光日麗雲覆雷同綿綿香火之隆恩覃自上秩秩本支之茂福在其中晚朝祈嗣久矣呼夭冀玄宗之有托凛焉終日何素志之未孚想因先世之所招或者微躬之自召將非塜訟其有詛盟適當朝謁之終輒敢敷陳之告伏願列真肆赦洗萬罪以消屯九氣妙凝接一陽而來復昊天正詞天籍屢書有上世久盟之黃籙露忱密奏兼微臣自許之丹衷答貺愆期陳情俟命伏念某少而失怙惕若投艱半生素志之未乎一脈後憂之甚大親莫留而願在躬自省以心知事會因循默推源之有故神明森列豈責報之所關茍為又食斯言其將奚辭于罰千愆並謝三欵一酬伏願曲宥無遺俯從允賴帝當博愛漙成物以資生臣不敢言竊容心而抱送知恩有日積善酬天三天詞急乃籲天可食言而棄信吉焉卜日庸報貺以修齋惠普及於顯幽鑒潛孚於微隱曲成有在善應無違思以致祥誓廣行於隂德賜之如願敢自泯於良心東極詞明科肇啓兼酬宿昔之言逝爽同升一拜維新之命聖功不宰人道重開瑞光之假借非𥝠生意之貫通無迹同胞同與各隨分以短長自色自形初何心於造化后土南極北極九幽帝留齋法救長夜之冥行臣撫愚𠂻答先時之宿欵道存萬範恩到九泉惟濟死以及生乃度幽而為福伏願善無不溥咸升朱府之髙願有必從少待洪鈞之轉萃善録卷下
